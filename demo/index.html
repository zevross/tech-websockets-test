<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="ZRSA demo testing" />
    <title>ZRSA</title>
  </head>
  <body
    style="
      position: relative;
      width: 30720px;
      height: 4320px;
      margin: 0;
      overflow: scroll;
    "
  >
    <div
      style="
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(16, minmax(0, 1fr));
      "
      id="grid"
    ></div>
    <iframe
      style="
        position: absolute;
        z-index: 2;
        width: 30720px;
        height: 4320px;
        top: 0;
        left: 0;
      "
      src="http://localhost:5173"
    ></iframe>
    <div
      style="
        position: absolute;
        z-index: 4;
        width: 30720px;
        height: 4320px;
        top: 0;
        left: 0;
        pointer-events: none;
      "
    ></div>
    <script>
      window.onload = () => {
        const grid = document.getElementById("grid");

        for (let i = 0; i < 16; i++) {
          const col = document.createElement("div");
          col.style.display = "grid";
          col.style.gridTemplateRows = `repeat(4, minmax(0, 1fr));`;
          col.style.width = "100%";
          col.style.height = "100%";
          for (let j = 0; j < 4; j++) {
            const cell = document.createElement("div");
            cell.style.border = "1px solid white";
            cell.style.width = "100%";
            cell.style.height = "100%";
            cell.style.backgroundColor = "#0004CD";
            col.appendChild(cell);
          }
          grid.appendChild(col);
        }
      };
    </script>
  </body>
</html>
